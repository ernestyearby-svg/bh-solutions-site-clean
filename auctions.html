<!-- Use your existing site stylesheet -->
<link rel="stylesheet" href="styles.css" />
</head>

<body>

<!-- OPTIONAL: If your site already has a header/nav, keep yours and delete this header block -->
<header class="site-header">
<nav class="site-nav">
<a href="index.html">HOME</a>
<a href="inventory.html">INVENTORY</a>
<a href="pre-approval.html">PRE-APPROVAL</a>

<a href="about.html">ABOUT</a>
<a href="auctions.html" class="active">AUCTIONS</a>
<a href="contact.html">CONTACT</a>
</nav>
</header>

<main>

<!-- HERO POSTER + CTA -->
<section class="auction-hero">
<img
src="auctions-poster-1.png"
alt="BH Solutions Auto Auctions"
class="auction-poster"
/>

<div class="auction-cta">
<a href="#dealer-registration" class="primary-btn">
Get Early Access
</a>
</div>
</section>

<!-- DEALER REGISTRATION FORM -->
<section id="dealer-registration" class="dealer-form-section">
<h2>Founding Dealer Registration</h2>
<p class="dealer-form-sub">
Dealer-only access. Verification required.
</p>

<!-- IMPORTANT: Replace YOUR_FORM_ID with your real Formspree form id -->
<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="dealer-form">
<input type="text" name="full_name" placeholder="Full Name" required />
<input type="text" name="dealership" placeholder="Dealership Name" required />
<input type="text" name="dealer_license" placeholder="Dealer License #" required />
<input type="email" name="email" placeholder="Email Address" required />
<input type="tel" name="phone" placeholder="Phone Number" required />

<!-- optional hidden fields to make emails cleaner -->
<input type="hidden" name="source" value="BH Auctions Landing Page" />

<button type="submit" class="primary-btn">
Register as a Dealer
</button>
</form>
</section>

</main>

<!-- OPTIONAL FOOTER -->
<footer class="site-footer">
<small>BH Solutions, LLC • Oroville, CA</small>
</footer>

</body>
</html>
