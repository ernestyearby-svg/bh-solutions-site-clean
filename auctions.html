<section id="dealer-registration" class="dealer-form-section">

<div class="dealer-form-card">

<h2>Founding Dealer Registration</h2>

<p class="subtext">
Dealer-only access. Verification required before bidding privileges are granted.
</p>

<form action="https://formspree.io/f/xzdaondj" method="POST">

<!-- Hidden Anti-Spam Field -->
<input type="text" name="_gotcha" style="display:none">

<input type="text"
name="Full Name"
placeholder="Full Name"
required>

<input type="text"
name="Dealership Name"
placeholder="Dealership Name"
required>

<input type="text"
name="Dealer License Number"
placeholder="Dealer License #"
required>

<input type="email"
name="Email Address"
placeholder="Email Address"
required>

<input type="tel"
name="Phone Number"
placeholder="Phone Number"
required>

<button type="submit" class="submit-btn">
Register as a Dealer
</button>

</form>

</div>

</section>
